<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumen Copy</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400&display=swap"
        rel="stylesheet">
</head>

<body>

    <div id="cur"></div>
    <div id="cur-ring"></div>

    <nav>
        <a href="#" class="nav-logo">LUMEN</a>
        <ul class="nav-links">
            <li><a href="#features">Features</a></li>
            <li><a href="#how">How it Works</a></li>
            <li><a href="#specs">Specs</a></li>
            <li><a href="#waitlist" class="nav-cta">Join Waitlist</a></li>
        </ul>
    </nav>

    <main class="hero">
        <div class="particles" id="particles"></div>
        <div class="hero-glow"></div>
        <div class="hero-ring"></div>
        <div class="hero-ring-2"></div>
    </main>

    <script>
        const cur = document.getElementById('cur');
        const ring = document.getElementById('cur-ring');
        let mx = 0, my = 0, rx = 0, ry = 0;

        document.addEventListener('mousemove', (e) => {
            mx = e.clientX;
            my = e.clientY;
            cur.style.left = mx + 'px';
            cur.style.top = my + 'px';
        });

        (function loop() {
            rx += (mx - rx) * 0.12;
            ry += (my - ry) * 0.12;
            ring.style.left = rx + 'px';
            ring.style.top = ry + 'px';
            requestAnimationFrame(loop);
        })();

        // Particles
        const container = document.getElementById('particles');
        for (let i = 0; i < 30; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.cssText = `
                left: ${Math.random() * 100}%;
                top: ${60 + Math.random() * 40}%;
                animation-duration: ${4 + Math.random() * 8}s;
                animation-delay: ${Math.random() * 6}s;
                opacity: 0;`;
            container.appendChild(p);
        }
    </script>
</body>

</html>
